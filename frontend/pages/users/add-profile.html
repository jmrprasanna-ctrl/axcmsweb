<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Profile - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/profile.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links" style="visibility:hidden;"></ul>
    </div>

    <div class="main-content">
        <div class="profile-page-header">
            <header><h2 id="formTitle">Add Profile</h2></header>
            <div class="profile-actions">
                <a class="icon-btn" href="profile-list.html" title="Back" aria-label="Back">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </a>
            </div>
        </div>

        <div class="form-container profile-card">
            <div class="profile-avatar-wrap">
                <img id="profileAvatarPreview" class="profile-avatar" src="../../assets/images/logo.png" alt="Profile Picture">
                <div class="profile-avatar-actions">
                    <input id="profilePictureFile" type="file" accept="image/png,image/jpeg,image/webp">
                    <small class="muted">Profile picture add / change</small>
                </div>
            </div>

            <div class="profile-grid">
                <div>
                    <label for="profileName">Name</label>
                    <input id="profileName" type="text" placeholder="Name">
                </div>
                <div>
                    <label for="profileEmail">Email</label>
                    <input id="profileEmail" type="email" placeholder="Email">
                </div>
                <div>
                    <label for="profileLoginUser">Login User</label>
                    <select id="profileLoginUser">
                        <option value="">Select Login User</option>
                    </select>
                </div>
                <div>
                    <label for="profileCompanyName">Company Name</label>
                    <input id="profileCompanyName" type="text" placeholder="Company Name">
                </div>
                <div>
                    <label for="profileCompanyCode">Company Code</label>
                    <input id="profileCompanyCode" type="text" placeholder="Company Code">
                </div>
                <div>
                    <label for="profileDepartment">Department</label>
                    <input id="profileDepartment" type="text" placeholder="Department">
                </div>
                <div>
                    <label for="profileSection">Section</label>
                    <input id="profileSection" type="text" placeholder="Section">
                </div>
                <div>
                    <label for="profileTel">Tel</label>
                    <input id="profileTel" type="text" placeholder="Tel">
                </div>
                <div>
                    <label for="profileMobile">Mobile</label>
                    <input id="profileMobile" type="text" placeholder="Mobile">
                </div>
                <div class="full">
                    <label for="profileAddress">Address</label>
                    <textarea id="profileAddress" rows="3" placeholder="Address"></textarea>
                </div>
            </div>

            <div class="profile-actions" style="margin-top:14px;">
                <button id="saveProfileBtn" class="icon-btn save-icon-btn" type="button" title="Save Profile" aria-label="Save Profile">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 4.5h11l3 3v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 3 19.5V6a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M8 4.5v5h7v-5M8 19h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="deleteProfileBtn" class="icon-btn delete-icon-btn" type="button" title="Delete Profile" aria-label="Delete Profile" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4.5 7h15M9.5 3.5h5M8 7v11.5m8-11.5v11.5M6.5 7l1 13a1.5 1.5 0 0 0 1.5 1.4h6a1.5 1.5 0 0 0 1.5-1.4l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/add-profile.js"></script>
</body>
</html>
