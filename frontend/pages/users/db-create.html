<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Create - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/db-create.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../clients/client-list.html">Client</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="db-create-header">
            <h2>Database Create</h2>
            <a class="icon-btn back-icon-btn" href="user-access.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </header>

        <div class="form-container db-create-wrap">
            <div class="db-create-grid">
                <div>
                    <label for="databaseName">Database Name</label>
                    <input id="databaseName" type="text" placeholder="example: nishani_company_db">
                    <div class="path-hint">Allowed: lowercase letters, numbers, underscore</div>
                </div>
                <div>
                    <label for="companyName">Company Name</label>
                    <input id="companyName" type="text" placeholder="Company name">
                </div>
            </div>

            <div class="access-actions db-create-actions" style="margin-top: 16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="saveDbBtn" class="icon-btn save-db-icon-btn" type="button" onclick="saveDatabase()" title="Save" aria-label="Save">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 4.5h11l3 3v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 3 19.5V6a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8 4.5v5h7v-5M8 19h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>
            <small id="dbCreateStatus" class="muted">Create company database with admin DB privilege.</small>

            <div class="db-table-wrap">
                <label>Created Databases (Super User Admin)</label>
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Database</th>
                            <th>Company</th>
                            <th>Created Date</th>
                            <th style="width: 120px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="createdDbTableBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js?v=20260406db01"></script>
    <script src="../../assets/extracted/pages/users/db-create.inline-script-1.js?v=20260406db01"></script>
</body>
</html>
