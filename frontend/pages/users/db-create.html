<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Create - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/db-create.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../customers/client-list.html">Client</a></li>
            <li><a href="../invoices/Payments-list.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>`r`n            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header><h2>Database Create</h2></header>

        <div class="form-container db-create-wrap">
            <div class="db-create-grid">
                <div>
                    <label for="databaseName">Database Name</label>
                    <input id="databaseName" type="text" placeholder="example: nishani_company_db">
                    <div class="path-hint">Allowed: lowercase letters, numbers, underscore</div>
                </div>
                <div>
                    <label for="companyName">Company Name</label>
                    <input id="companyName" type="text" placeholder="Company name">
                </div>
            </div>

            <div class="access-actions" style="margin-top: 16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="saveDbBtn" class="btn btn-primary" type="button" onclick="saveDatabase()">Save</button>
                <a class="icon-btn back-icon-btn" href="user-access.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>

            <div class="db-table-wrap">
                <label>Created Databases (Super User Admin)</label>
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Database</th>
                            <th>Company</th>
                            <th>Created Date</th>
                            <th style="width: 120px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="createdDbTableBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/db-create.inline-script-1.js"></script>
</body>
</html>
