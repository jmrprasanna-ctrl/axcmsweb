<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile List - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/profile.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links" style="visibility:hidden;"></ul>
    </div>

    <div class="main-content">
        <div class="profile-page-header">
            <header><h2>Profile List</h2></header>
            <div class="profile-actions">
                <button id="addProfileBtn" class="icon-btn add-icon-btn" type="button" title="Add Profile" aria-label="Add Profile">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <a class="icon-btn back-icon-btn" href="user-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>
        </div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>Email</th>
                        <th>Login User</th>
                        <th>Company</th>
                        <th>Department</th>
                        <th>Mobile</th>
                    </tr>
                </thead>
                <tbody id="profileTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="../../assets/js/api.js?v=20260405p04"></script>
