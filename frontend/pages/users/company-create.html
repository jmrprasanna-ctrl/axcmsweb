<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../assets/css/style.css">

</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../customers/client-list.html">Client</a></li>
            <li><a href="../invoices/create-invoice.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>`r`n            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="company-create-header">
            <h2>Company Create</h2>
            <a class="icon-btn back-icon-btn" href="user-access.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </header>

        <div class="form-container company-wrap">
            <div class="company-grid">
                <div>
                    <label for="companyName">Company Name</label>
                    <input id="companyName" type="text" placeholder="Company name">
                </div>
                <div>
                    <label for="companyCode">Company Code</label>
                    <input id="companyCode" type="text" placeholder="Company code">
                </div>
                <div>
                    <label for="companyEmail">Email</label>
                    <input id="companyEmail" type="email" placeholder="company@email.com">
                </div>
                <div>
                    <label for="logoFile">Company Logo</label>
                    <input id="logoFile" type="file" accept=".jpg,.jpeg,.bmp,.gif,.tiff,.tif,.png">
                    <div class="path-hint">Allowed formats: .jpg, .jpeg, .bmp, .gif, .tiff, .png</div>
                </div>
            </div>

            <div class="access-actions company-create-actions" style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="saveCompanyBtn" class="icon-btn save-company-icon-btn" type="button" onclick="saveCompany()" title="Save" aria-label="Save">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 4.5h11l3 3v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 3 19.5V6a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8 4.5v5h7v-5M8 19h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>

            <div class="company-table-wrap">
                <label>Created Companies</label>
                <table class="company-table">
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>Company Code</th>
                            <th>Email</th>
                            <th>Mapped</th>
                            <th>Logo File</th>
                            <th>Created Date</th>
                        </tr>
                    </thead>
                    <tbody id="companyTableBody">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/company-create.inline-script-1.js?v=20260408a"></script>

</html>
