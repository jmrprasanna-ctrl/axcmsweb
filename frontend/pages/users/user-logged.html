<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Logged - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/user-logged.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../clients/client-list.html">Client</a></li>
            <li><a href="../invoices/create-invoice.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="user-logged-page-header">
            <header>
                <h2>Logged Times</h2>
            </header>
            <a class="icon-btn back-icon-btn" href="../dashboard.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </div>

        <div class="form-container log-shell">
            <div class="log-toolbar">
                <div class="log-filter">
                    <label for="periodSelect">Summary Period</label>
                    <select id="periodSelect">
                        <option value="week">Week</option>
                        <option value="month">Month</option>
                        <option value="year">Year</option>
                    </select>
                </div>
                <div class="log-filter">
                    <label for="dateInput">Date Reference</label>
                    <input id="dateInput" type="date">
                </div>
                <div class="log-filter">
                    <label for="userSelect">Select User</label>
                    <select id="userSelect">
                        <option value="">All Users</option>
                    </select>
                </div>
                <div class="log-actions">
                    <button class="icon-btn clear-icon-btn" id="clearLogsBtn" type="button" title="Clear Logs" aria-label="Clear Logs">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4.5 7h15M9.5 3.5h5M8 7v11.5m8-11.5v11.5M6.5 7l1 13a1.5 1.5 0 0 0 1.5 1.4h6a1.5 1.5 0 0 0 1.5-1.4l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button class="icon-btn pdf-icon-btn" id="saveLogsPdfBtn" type="button" title="Save PDF" aria-label="Save PDF">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M7 3.5h7l4 4v13a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 20.5V5A1.5 1.5 0 0 1 7.5 3.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M14 3.5V8h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8.5 16h7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="log-table-wrap">
                <table id="loggedTable">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Role</th>
                            <th>Login Time</th>
                            <th>IP</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody id="loggedBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../../assets/extracted/pages/users/user-logged.inline-script-1.js"></script>
</body>
</html>
