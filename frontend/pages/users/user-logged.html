<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Logged - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .log-shell{
            overflow: visible !important;
        }
        .log-toolbar{
            display:flex;
            gap:10px;
            align-items:flex-end;
            flex-wrap:wrap;
            margin-bottom:12px;
        }
        .log-filter{
            min-width: 190px;
        }
        .log-filter label{
            margin-top:0;
        }
        .log-filter select,
        .log-filter input{
            margin-top:0;
        }
        .log-actions{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            align-items:center;
            margin-left:auto;
        }
        .log-table-wrap{
            width:100%;
            overflow-x:auto;
            margin-top:12px;
        }
        #loggedTable{
            min-width: 900px;
        }
        #loggedTable th,
        #loggedTable td{
            padding: 11px 12px;
        }
        @media (max-width: 900px){
            .log-toolbar{
                flex-direction:column;
                align-items:stretch;
            }
            .log-filter,
            .log-actions{
                width:100%;
            }
            .log-filter{
                min-width: 0;
            }
            .log-actions > *{
                width:100%;
                margin-left:0 !important;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header><h2>User Logged Times</h2></header>

        <div class="form-container log-shell">
            <div class="log-toolbar">
                <div class="log-filter">
                    <label for="periodSelect">Summary Period</label>
                    <select id="periodSelect">
                        <option value="week">Week</option>
                        <option value="month">Month</option>
                        <option value="year">Year</option>
                    </select>
                </div>
                <div class="log-filter">
                    <label for="dateInput">Date Reference</label>
                    <input id="dateInput" type="date">
                </div>
                <div class="log-filter">
                    <label for="userSelect">Select User</label>
                    <select id="userSelect">
                        <option value="">All Users</option>
                    </select>
                </div>
                <div class="log-actions">
                    <button class="btn btn-danger" type="button" onclick="clearLogs()">Clear</button>
                    <button class="btn btn-primary" type="button" onclick="loadLogs()">Search</button>
                    <button class="btn btn-primary" type="button" onclick="savePDF()">Save PDF</button>
                    <a class="btn btn-secondary" href="user-list.html">Back</a>
                </div>
            </div>

            <div class="log-table-wrap">
                <table id="loggedTable">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Role</th>
                            <th>Login Time</th>
                            <th>IP</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody id="loggedBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const role = (localStorage.getItem("role") || "").toLowerCase();
        if(role !== "admin"){
            alert("Only admin can access logged history.");
            window.location.href = "../dashboard.html";
        }

        const periodEl = document.getElementById("periodSelect");
        const dateEl = document.getElementById("dateInput");
        const userEl = document.getElementById("userSelect");

        async function loadUsers(){
            try{
                const users = await request("/users", "GET");
                userEl.innerHTML = `<option value="">All Users</option>`;
                (Array.isArray(users) ? users : []).forEach((u) => {
                    const opt = document.createElement("option");
                    opt.value = String(u.id);
                    opt.textContent = `${u.username} (${u.role})`;
                    userEl.appendChild(opt);
                });
            }catch(err){
                alert(err.message || "Failed to load users");
            }
        }

        async function loadLogs(){
            const period = periodEl.value || "week";
            const date = dateEl.value || "";
            const userId = userEl.value || "";
            const query = `?period=${encodeURIComponent(period)}&date=${encodeURIComponent(date)}&user_id=${encodeURIComponent(userId)}`;
            try{
                const data = await request(`/users/logs${query}`, "GET");
                const rows = Array.isArray(data.rows) ? data.rows : [];
                const tbody = document.getElementById("loggedBody");
                tbody.innerHTML = "";
                if(!rows.length){
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td colspan="5">No login logs found.</td>`;
                    tbody.appendChild(tr);
                    return;
                }
                rows.forEach((r) => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${r.username || ""}</td>
                        <td>${r.role || ""}</td>
                        <td>${r.login_time ? new Date(r.login_time).toLocaleString() : ""}</td>
                        <td>${r.ip_address || ""}</td>
                        <td>${r.city || ""}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }catch(err){
                alert(err.message || "Failed to load login logs");
            }
        }

        async function clearLogs(){
            const ok = confirm("Are you sure you want to clear all logged time records?");
            if(!ok) return;
            try{
                await request("/users/logs", "DELETE");
                showMessageBox("Logged time records cleared.");
                await loadLogs();
            }catch(err){
                alert(err.message || "Failed to clear login logs");
            }
        }

        function savePDF(){
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ format: "a4" });
            doc.setFontSize(10);
            doc.text("User Logged Times", 14, 20);
            doc.text(`Period: ${periodEl.value || ""}`, 14, 26);
            doc.text(`Date: ${dateEl.value || ""}`, 80, 26);
            const userText = userEl.options[userEl.selectedIndex] ? userEl.options[userEl.selectedIndex].text : "All Users";
            doc.text(`User: ${userText}`, 130, 26);
            let y = 34;
            const rows = document.querySelectorAll("#loggedTable tbody tr");
            rows.forEach((r) => {
                const cells = Array.from(r.children).slice(0, 5).map((td) => td.innerText);
                doc.text(cells.join(" | "), 14, y);
                y += 8;
                if(y > 285){
                    doc.addPage();
                    y = 20;
                }
            });
            doc.save("User_Logged_Times.pdf");
        }

        dateEl.value = new Date().toISOString().slice(0, 10);
        periodEl.addEventListener("change", loadLogs);
        dateEl.addEventListener("change", loadLogs);
        userEl.addEventListener("change", loadLogs);

        (async function init(){
            await loadUsers();
            await loadLogs();
        })();
    </script>
</body>
</html>
