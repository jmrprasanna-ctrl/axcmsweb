<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/edit-user.inline-style-1.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>

    <div class="main-content">
        <div class="edit-user-page-header">
            <header>
                <h2>Edit User</h2>
                <p class="muted">Update user details and access information.</p>
            </header>
            <a class="icon-btn back-icon-btn" href="user-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </div>
        <div class="form-container">
            <form id="editUserForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Enter company name" required>

                <label for="department">Department</label>
                <input type="text" id="department" placeholder="Enter department" required>

                <label for="tel">Telephone</label>
                <input type="text" id="tel" placeholder="Enter telephone" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <label for="role">Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                </select>

                <label for="password">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Leave blank to keep current password">
                    <button type="button" class="toggle-pass" id="togglePassword" aria-label="Show password" aria-pressed="false">
                        <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                    </button>
                </div>
                <p class="hint">Leave password blank to keep the current password.</p>

                <div class="form-actions">
                    <button type="submit" class="icon-btn save-icon-btn" title="Save Changes" aria-label="Save Changes">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 4.5h11l3 3v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 3 19.5V6a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M8 4.5v5h7v-5M8 19h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" class="icon-btn delete-icon-btn" id="deleteUserBtn" title="Delete User" aria-label="Delete User">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4.5 7h15M9.5 3.5h5M8 7v11.5m8-11.5v11.5M6.5 7l1 13a1.5 1.5 0 0 0 1.5 1.4h6a1.5 1.5 0 0 0 1.5-1.4l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/edit-user.inline-script-1.js"></script>
</body>
</html>
