<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .form-actions{
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .btn-secondary{
            background: #e9f3fc;
            color: #0b4f93;
            border: 1px solid #cfe1f5;
            text-decoration: none;
        }
        .btn-secondary:hover{
            filter: brightness(0.98);
        }
        .input-wrap{
            position: relative;
        }
        .input-wrap input{
            padding-right: 52px;
        }
        button.toggle-pass{
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            margin-top: 0;
            min-height: 0;
            border: 0;
            background: transparent;
            color: #7f8c98;
            cursor: pointer;
            padding: 6px;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
            filter: none;
        }
        button.toggle-pass:hover{
            background:#eef3f8;
            color:#4f7ea9;
            transform: translateY(-50%);
            box-shadow: none;
            filter: none;
        }
        button.toggle-pass:focus{
            outline:none;
            box-shadow:0 0 0 3px rgba(79,126,169,0.2);
        }
        .hint{
            margin: 4px 0 12px;
            color: #5d7082;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>

    <div class="main-content">
        <header><h2>Edit User</h2></header>
        <div class="form-container">
            <form id="editUserForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Enter company name" required>

                <label for="department">Department</label>
                <input type="text" id="department" placeholder="Enter department" required>

                <label for="tel">Telephone</label>
                <input type="text" id="tel" placeholder="Enter telephone" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <label for="role">Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                </select>

                <label for="password">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Leave blank to keep current password">
                    <button type="button" class="toggle-pass" id="togglePassword" aria-label="Show password" aria-pressed="false">
                        <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                    </button>
                </div>
                <p class="hint">Leave password blank to keep the current password.</p>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a class="btn btn-secondary" href="user-list.html">Back</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        function getUserId(){
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        async function loadUser(){
            const id = getUserId();
            if(!id){
                alert("Missing user id");
                window.location.href = "user-list.html";
                return;
            }
            try{
                const user = await request(`/users/${id}`,"GET");
                document.getElementById('username').value = user.username || "";
                document.getElementById('company').value = user.company || "";
                document.getElementById('department').value = user.department || "";
                document.getElementById('tel').value = user.telephone || "";
                document.getElementById('email').value = user.email || "";
                document.getElementById('role').value = user.role || "";
            }catch(err){
                alert(err.message || "Failed to load user");
                window.location.href = "user-list.html";
            }
        }

        window.addEventListener("load", () => {
            const form = document.getElementById('editUserForm');
            const companyInput = document.getElementById('company');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            companyInput.style.textTransform = "uppercase";
            companyInput.addEventListener("input", () => {
                const pos = companyInput.selectionStart;
                companyInput.value = companyInput.value.toUpperCase();
                companyInput.setSelectionRange(pos, pos);
            });

            form.addEventListener('submit', async e => {
                e.preventDefault();
                const id = getUserId();
                const payload = {
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    role: document.getElementById('role').value,
                    company: document.getElementById('company').value.trim(),
                    department: document.getElementById('department').value.trim(),
                    telephone: document.getElementById('tel').value.trim()
                };
                const password = document.getElementById('password').value;
                if(password){
                    payload.password = password;
                }
                try{
                    await request(`/users/${id}`,"PUT",payload);
                    showMessageBox("User updated successfully!");
                    window.location.href = "user-list.html";
                }catch(err){
                    alert(err.message || "Failed to update user");
                }
            });

            togglePassword.addEventListener("click", () => {
                const isPassword = passwordInput.type === "password";
                passwordInput.type = isPassword ? "text" : "password";
                togglePassword.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
                togglePassword.setAttribute("aria-pressed", isPassword ? "true" : "false");
                eyeIcon.innerHTML = isPassword
                    ? '<path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M2 12C3.9 8 7.4 5.5 12 5.5C13.8 5.5 15.4 5.9 16.8 6.7M20.2 9.4C20.9 10.2 21.5 11 22 12C20.1 16 16.6 18.5 12 18.5C8.2 18.5 5.2 16.8 3.2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>'
                    : '<path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>';
            });

            loadUser();
        });
    </script>
</body>
</html>
