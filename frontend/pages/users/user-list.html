<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/user-list.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../customers/client-list.html">Client</a></li>
            <li><a href="../invoices/Payments-list.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>`r`n            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="user-list-page-header">
            <header>
                <h2>User List</h2>
            </header>
            <a class="icon-btn back-icon-btn" href="../dashboard.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </div>
        <div class="form-actions">
            <a class="icon-btn add-icon-btn" href="add-user.html" title="Add User" aria-label="Add User">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </a>
            <button id="btnCheckTools" class="btn btn-primary is-hidden" type="button">Check Tools</button>
            <button id="btnBackup" class="btn btn-primary is-hidden" type="button">Backup</button>
            <button id="btnUploadDb" class="btn btn-primary is-hidden" type="button">Upload DB</button>
            <input id="restore-db-file" type="file" accept=".sql" class="is-hidden">
        </div>

        <section class="health-panel" id="healthPanel" aria-live="polite">
            <div class="health-head">
                <h3>System Health</h3>
                <button class="icon-btn refresh-icon-btn" type="button" id="healthRefreshBtn" title="Refresh" aria-label="Refresh" onclick="loadSystemHealthPreview && loadSystemHealthPreview()">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M20 11a8 8 0 1 0 2.1 5.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M20 4.5V11h-6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="health-grid">
                <div class="health-item"><span class="health-label">Overall</span><span class="health-badge unknown" id="healthOverall">Unknown</span></div>
                <div class="health-item"><span class="health-label">Database</span><span class="health-badge unknown" id="healthDb">Unknown</span></div>
                <div class="health-item"><span class="health-label">pg_dump</span><span class="health-badge unknown" id="healthPgDump">Unknown</span></div>
                <div class="health-item"><span class="health-label">psql</span><span class="health-badge unknown" id="healthPsql">Unknown</span></div>
                <div class="health-item"><span class="health-label">Invoice Template</span><span class="health-badge unknown" id="healthTplInvoice">Unknown</span></div>
            </div>
            <p class="muted health-updated" id="healthUpdatedAt">Last updated: -</p>
        </section>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Company</th>
                        <th>Department</th>
                        <th>Telephone</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="../../assets/js/api.js?v=20260324p4"></script>
    <script src="../../assets/extracted/pages/users/user-list.inline-script-1.js"></script>
</body>
</html>
