<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inv Map - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/inv-map.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../customers/client-list.html">Client</a></li>
            <li><a href="../invoices/Payments-list.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>`r`n            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header><h2>Inv Map</h2></header>

        <div class="form-container inv-map-wrap">
            <div class="inv-map-grid">
                <div>
                    <label for="userSelect">User</label>
                    <select id="userSelect"><option value="">Select user</option></select>
                </div>
                <div>
                    <label for="databaseSelect">Database</label>
                    <select id="databaseSelect"><option value="">Select database</option></select>
                </div>
            </div>

            <div class="inv-map-card">
                <label style="margin-bottom:8px;display:block;">Invoice Mapped Functions</label>
                <table class="inv-map-table">
                    <thead>
                        <tr>
                            <th>Function</th>
                            <th>Preference Source</th>
                            <th>Enable</th>
                        </tr>
                    </thead>
                    <tbody id="featureBody"></tbody>
                </table>
            </div>

            <div class="inv-map-card">
                <div class="inv-map-row"><strong>Verify Status</strong><span id="verifyStatus">Not verified</span></div>
                <div class="inv-map-row"><strong>Missing Preferences</strong><span id="missingStatus">-</span></div>
            </div>

            <div class="inv-map-card">
                <label style="margin-bottom:8px;display:block;">Mapped Entries</label>
                <table class="inv-map-table entries-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Uploads</th>
                            <th>Database</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="entriesBody">
                        <tr><td colspan="5" style="text-align:center;color:#5d6f85;">No mapped entries</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="access-actions" style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="verifyBtn" class="btn btn-secondary" type="button" onclick="verifyInvMap()">Verify</button>
                <button id="mappedBtn" class="btn btn-primary" type="button" onclick="saveInvMap()">Mapped</button>
                <a class="icon-btn back-icon-btn" href="user-access.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/inv-map.inline-script-1.js"></script>
</body>
</html>
