<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - AXIS_CMS_WEB</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/add-user.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>AXIS_CMS_WEB</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../customers/client-list.html">Client</a></li>
            <li><a href="../invoices/Payments-list.html">Invoices</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>`r`n            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="add-user-page-header">
            <header>
                <h2>Add User</h2>
                <p class="muted">Create a new user account.</p>
            </header>
            <a class="icon-btn back-icon-btn" href="user-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
        </div>
        <div class="form-container">
            <form id="addUserForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label for="company">Company</label>
                <select id="company" required>
                    <option value="">Select company</option>
                </select>
                <small id="companyHint" class="muted">Mapped companies will load here.</small>
                <small id="targetDbHint" class="muted">User will be created in selected mapped database.</small>

                <label for="department">Department</label>
                <input type="text" id="department" placeholder="Enter department" required>

                <label for="tel">Telephone</label>
                <input type="text" id="tel" placeholder="Enter telephone" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <label for="role">Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                </select>

                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <button type="button" class="toggle-pass" id="togglePassword" aria-label="Show password" aria-pressed="false">
                        <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                    </button>
                </div>

                <div class="form-actions">
                    <button type="submit" class="icon-btn save-icon-btn" title="Save User" aria-label="Save User">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 4.5h11l3 3v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 3 19.5V6a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M8 4.5v5h7v-5M8 19h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js?v=20260406u03"></script>
    <script src="../../assets/extracted/pages/users/add-user.inline-script-1.js?v=20260406u04"></script>
</body>
</html>
