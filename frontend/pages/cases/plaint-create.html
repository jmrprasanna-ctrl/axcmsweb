<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaint Create - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/cases.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="case-list.html">Cases</a></li>
        <li><a href="new-case.html">New Case</a></li>
        <li><a href="plaint.html">Plaint</a></li>
        <li><a href="answer.html">Answer</a></li>
        <li><a href="witness-list.html">List of witnesses</a></li>
        <li><a href="judgment-list.html">Dugement</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Plaint Create</h2></header>
    <div class="form-container">
        <form id="plaintForm" class="form-grid">
            <input type="hidden" id="plaintId">
            <div>
                <label for="plaint_date">Date</label>
                <input type="date" id="plaint_date" required>
            </div>
            <div>
                <label for="case_search">Case Selection Text</label>
                <input type="text" id="case_search" list="caseOptions" placeholder="Search case no + customer" required>
                <datalist id="caseOptions"></datalist>
                <input type="hidden" id="case_id">
            </div>
            <div>
                <label for="customer_name">Customer Name</label>
                <input type="text" id="customer_name" class="readonly-field" readonly>
            </div>
            <div>
                <label for="case_no">Case No</label>
                <input type="text" id="case_no" class="readonly-field" readonly>
            </div>
            <div>
                <label for="court">Court</label>
                <input type="text" id="court" class="readonly-field" readonly>
            </div>
            <div>
                <label for="attend_lawyer">Attend Lawyer</label>
                <input type="text" id="attend_lawyer" class="readonly-field" readonly>
            </div>
            <div class="full">
                <label for="comment">Comment</label>
                <textarea id="comment" rows="6" placeholder="Plaint comment (up to 1000 words)"></textarea>
                <div class="word-hint" id="commentWords">0/1000 words</div>
            </div>
            <div>
                <label for="upload_method">Upload Option</label>
                <select id="upload_method">
                    <option value="local">Upload photos on local machine</option>
                    <option value="take-photo">Take a photo</option>
                </select>
            </div>
            <div>
                <label for="uploads">Upload Photos</label>
                <input type="file" id="uploads" accept="image/*" multiple>
            </div>
            <div class="full upload-preview" id="uploadPreview"></div>
            <div class="full cases-actions">
                <button type="submit" class="btn btn-primary">Save Plaint</button>
                <a class="icon-btn back-icon-btn" href="plaint.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js?v=20260402p03"></script>
<script src="../../assets/js/plaint-create.js?v=20260402p01"></script>
</body>
</html>
