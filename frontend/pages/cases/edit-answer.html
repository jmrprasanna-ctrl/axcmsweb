<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Answer - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/cases.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="case-list.html">Cases</a></li>
        <li><a href="new-case.html">New Case</a></li>
        <li><a href="plaint.html">Plaint</a></li>
        <li><a href="answer.html">Answer</a></li>
        <li><a href="witness-list.html">List of witnesses</a></li>
        <li><a href="judgment-list.html">Dugement</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="cases-page-header">
        <h2>Edit Answer</h2>
        <a class="icon-btn back-icon-btn" href="answer.html" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </a>
    </header>
    <div class="form-container">
        <form id="answerForm" class="form-grid">
            <input type="hidden" id="answerId">
            <div class="full edit-lock-row">
                <label class="checkbox-inline" for="edit_enabled">
                    <input type="checkbox" id="edit_enabled">
                    Edit
                </label>
            </div>
            <div>
                <label for="answer_date">Date</label>
                <input type="date" id="answer_date" required>
            </div>
            <div>
                <label for="case_search">Case Selection Text</label>
                <input type="text" id="case_search" list="caseOptions" placeholder="Search case no + customer" required>
                <datalist id="caseOptions"></datalist>
                <input type="hidden" id="case_id">
            </div>
            <div>
                <label for="customer_name">Customer Name</label>
                <input type="text" id="customer_name" class="readonly-field" readonly>
            </div>
            <div>
                <label for="case_no">Case No</label>
                <input type="text" id="case_no" class="readonly-field" readonly>
            </div>
            <div>
                <label for="court">Court</label>
                <input type="text" id="court" class="readonly-field" readonly>
            </div>
            <div>
                <label for="attend_lawyer">Attend Lawyer</label>
                <input type="text" id="attend_lawyer" class="readonly-field" readonly>
            </div>
            <div>
                <label for="answer_step">Answer Step</label>
                <select id="answer_step">
                    <option value="STEP">Step</option>
                    <option value="NEXT_STEP">Next Step</option>
                </select>
            </div>
            <div class="full">
                <label for="comment">Comment</label>
                <textarea id="comment" rows="6" placeholder="Answer comment (up to 1000 words)"></textarea>
                <div class="word-hint" id="commentWords">0/1000 words</div>
            </div>
            <div class="full">
                <label>Upload Option</label>
                <div class="upload-picker">
                    <button type="button" class="upload-trigger upload-trigger-icon" id="cameraUploadBtn" title="Camera" aria-label="Camera">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4.5 8.2h3l1.2-2h6.6l1.2 2h3A1.8 1.8 0 0 1 21.3 10v8.3a1.8 1.8 0 0 1-1.8 1.8H4.5a1.8 1.8 0 0 1-1.8-1.8V10a1.8 1.8 0 0 1 1.8-1.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                            <circle cx="12" cy="14.2" r="3.3" stroke="currentColor" stroke-width="1.7"></circle>
                        </svg>
                    </button>
                    <button type="button" class="upload-trigger upload-trigger-icon" id="folderUploadBtn" title="Folder Upload" aria-label="Folder Upload">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M3.5 7.2a1.7 1.7 0 0 1 1.7-1.7h4l1.7 2h7.6a1.7 1.7 0 0 1 1.7 1.7v8.6a1.7 1.7 0 0 1-1.7 1.7H5.2a1.7 1.7 0 0 1-1.7-1.7V7.2Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                            <path d="M12 10.3v5.8M9.4 13h5.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
                <input type="file" id="camera_uploads" accept="image/*" capture="environment" multiple hidden>
                <input type="file" id="folder_uploads" accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx" multiple hidden>
            </div>
            <div class="full upload-preview" id="uploadPreview"></div>
            <div class="full cases-actions">
                <button type="submit" class="icon-btn save-icon-btn" title="Update Answer" aria-label="Update Answer">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6.8 3.5h8.9l2.8 2.8v13a1.7 1.7 0 0 1-1.7 1.7H7.2a1.7 1.7 0 0 1-1.7-1.7V5.2a1.7 1.7 0 0 1 1.3-1.7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 3.5v5.2h6.1V3.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 16h6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                    </svg>
                </button>
                <button type="button" class="icon-btn delete-icon-btn" id="deleteAnswerBtn" title="Delete" aria-label="Delete">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6 7h12M9.5 7V5.5h5V7M10 10.5v6M14 10.5v6M7.5 7l.7 10.2a1.5 1.5 0 0 0 1.5 1.4h4.6a1.5 1.5 0 0 0 1.5-1.4L16.5 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>
        </form>
        <div class="history-panel">
            <h3>Case History</h3>
            <div class="customer-table-wrap">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Step</th><th>Next Date</th><th>Comment</th></tr>
                    </thead>
                    <tbody id="caseHistoryBody"><tr><td colspan="4">Loading history...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js?v=20260402p03"></script>
<script src="../../assets/js/case-history.js?v=20260403p01"></script>
<script src="../../assets/js/edit-answer.js?v=20260420p01"></script>
</body>
</html>
