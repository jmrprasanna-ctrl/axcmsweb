<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Case - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/cases.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="case-list.html">Cases</a></li>
        <li><a href="new-case.html">New Case</a></li>
        <li><a href="plaint.html">Plaint</a></li>
        <li><a href="answer.html">Answer</a></li>
        <li><a href="witness-list.html">List of witnesses</a></li>
        <li><a href="judgment-list.html">Dugement</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Edit Case</h2></header>
    <div class="form-container">
        <form id="caseForm" class="form-grid">
            <input type="hidden" id="caseId">
            <div class="full edit-lock-row">
                <label class="checkbox-inline" for="edit_enabled">
                    <input type="checkbox" id="edit_enabled">
                    Edit
                </label>
            </div>
            <div>
                <label for="case_date">Date</label>
                <input type="date" id="case_date" required>
            </div>
            <div>
                <label for="case_no">Case No</label>
                <input type="text" id="case_no" required>
            </div>
            <div class="full">
                <label for="customer_search">Customer Name Search</label>
                <input type="text" id="customer_search" list="customerOptions" placeholder="Search customer name" required>
                <datalist id="customerOptions"></datalist>
                <input type="hidden" id="customer_id">
            </div>
            <div>
                <label for="court_type">Court Type</label>
                <select id="court_type" required>
                    <option value="">Select Court Type</option>
                    <option value="DC Court">DC Court</option>
                    <option value="High Court">High Court</option>
                    <option value="Supreme Court">Supreme Court</option>
                </select>
            </div>
            <div>
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                </select>
            </div>
            <div>
                <label for="court">Court</label>
                <input type="text" id="court" required>
            </div>
            <div>
                <label for="attend_lawyer">Attend Lawyer</label>
                <input type="text" id="attend_lawyer" required>
            </div>
            <div>
                <label for="case_step">Case Step</label>
                <select id="case_step">
                    <option value="STEP">Step</option>
                    <option value="PLAINT_STEP">Plaint Step</option>
                    <option value="ANSWER_STEP">Answer Step</option>
                    <option value="LW_STEP">L/W Step</option>
                    <option value="DUDGMENT_STEP">Dudgment Step</option>
                    <option value="FINISHED">Finished</option>
                </select>
            </div>
            <div>
                <label for="next_date">Next Date</label>
                <input type="date" id="next_date">
            </div>
            <div class="full">
                <label for="comment">Comment</label>
                <textarea id="comment" rows="7" placeholder="Case comments (up to 1000 words)"></textarea>
                <div class="word-hint" id="commentWords">0/1000 words</div>
            </div>
            <div>
                <label for="upload_method">Upload Option</label>
                <select id="upload_method">
                    <option value="local">Upload photos on local machine</option>
                    <option value="take-photo">Take a photo</option>
                </select>
            </div>
            <div>
                <label for="uploads">Upload Photos</label>
                <input type="file" id="uploads" accept="image/*" multiple>
            </div>
            <div class="full upload-preview" id="uploadPreview"></div>
            <div class="full cases-actions">
                <button type="submit" class="btn btn-primary">Update Case</button>
                <button type="button" class="btn btn-danger" id="deleteCaseBtn">Delete</button>
                <a class="icon-btn back-icon-btn" href="case-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>
        </form>
        <div class="history-panel">
            <h3>Case History</h3>
            <div class="customer-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Step</th>
                            <th>Next Date</th>
                            <th>Comment</th>
                        </tr>
                    </thead>
                    <tbody id="caseHistoryBody">
                        <tr><td colspan="4">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js?v=20260402p03"></script>
<script src="../../assets/js/case-history.js?v=20260403p01"></script>
<script src="../../assets/js/edit-case.js?v=20260403p08"></script>
</body>
</html>
