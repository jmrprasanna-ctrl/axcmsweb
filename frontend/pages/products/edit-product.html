<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .form-actions{
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .btn-secondary{
            background: #e9f3fc;
            color: #0b4f93;
            border: 1px solid #cfe1f5;
            text-decoration: none;
        }
        .btn-secondary:hover{
            filter: brightness(0.98);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
            <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
    </div>

    <div class="main-content">
        <header><h2>Edit Product</h2></header>
        <div class="form-container">
            <form id="editProductForm">
                <label for="productId">Product ID</label>
                <input type="text" id="productId" readonly>

                <label for="description">Description</label>
                <input type="text" id="description" required>

                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                </select>

                <label for="model">Model</label>
                <input type="text" id="model" required>

                <label for="serial_no">Serial No</label>
                <input type="text" id="serial_no">

                <label for="count">Quantity</label>
                <input type="number" id="count" required>

                <label for="sellingPrice">Selling Price</label>
                <input type="number" id="sellingPrice" required>

                <label for="dealerPrice">Dealer Price</label>
                <input type="number" id="dealerPrice" required>

                <label for="vendor">Vendor</label>
                <select id="vendor" required></select>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Product</button>
                    <a class="btn btn-secondary" href="product-list.html">Back</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if(!productId){
            alert("Missing product id.");
            window.location.href = "product-list.html";
        }

        async function loadCategories(){
            try{
                const categories = await request("/categories","GET");
                const select = document.getElementById("category");
                select.innerHTML = "<option value=\"\">Select Category</option>";
                categories.forEach(c=>{
                    const opt = document.createElement("option");
                    opt.value = String(c.id);
                    opt.dataset.name = c.name;
                    opt.innerText = c.name;
                    select.appendChild(opt);
                });
            }catch(_err){
                // ignore, category list will stay as-is
            }
        }

        async function loadVendors(){
            try{
                const vendors = await request("/vendors","GET");
                const select = document.getElementById("vendor");
                select.innerHTML = "";
                vendors.forEach(v=>{
                    const opt = document.createElement("option");
                    opt.value = v.id;
                    opt.innerText = v.name;
                    select.appendChild(opt);
                });
            }catch(_err){
                // ignore
            }
        }

        const loadProduct = async () => {
            const product = await request(`/products/${productId}`,"GET");
            document.getElementById('productId').value = product.product_id || "";
            document.getElementById('description').value = product.description || "";
            document.getElementById('model').value = product.model || "";
            document.getElementById('serial_no').value = product.serial_no || "";
            document.getElementById('count').value = product.count || 0;
            document.getElementById('sellingPrice').value = product.selling_price || 0;
            document.getElementById('dealerPrice').value = product.dealer_price || 0;
            if(product.Vendor){
                document.getElementById('vendor').value = product.Vendor.id;
            }
            if(product.Category){
                document.getElementById('category').value = String(product.Category.id);
            }
        };

        window.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadVendors();
            await loadProduct();
        });

        const form = document.getElementById('editProductForm');
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const categorySelect = document.getElementById('category');
            const updatedProduct = {
                product_id: document.getElementById('productId').value,
                description: document.getElementById('description').value,
                category: categorySelect.value || (categorySelect.selectedOptions[0]?.dataset?.name || ""),
                model: document.getElementById('model').value,
                serial_no: document.getElementById('serial_no').value,
                count: document.getElementById('count').value,
                selling_price: document.getElementById('sellingPrice').value,
                dealer_price: document.getElementById('dealerPrice').value,
                vendor_id: document.getElementById('vendor').value
            };
            await request(`/products/${productId}`,"PUT",updatedProduct);
            showMessageBox('Product updated successfully!');
        });

        function logout(){
            localStorage.removeItem("token");
            localStorage.removeItem("role");
            window.location.href="../login.html";
        }
    </script>
</body>
</html>
