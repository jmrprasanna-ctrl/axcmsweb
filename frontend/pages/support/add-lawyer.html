<div class="main-content">
    <header class="support-page-header">
        <h2>Add Lawyer</h2>
        <a class="icon-btn back-icon-btn" href="lawyer-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
    </header>
    <div class="form-container" style="max-width: 820px;">
        <form id="addLawyerForm" class="support-form">
            <div>
                <label for="lawyerName">Lawyer Name</label>
                <input type="text" id="lawyerName" class="uppercase-input" placeholder="Lawyer Name" required>
            </div>
            <div>
                <label for="lawyerMobile">Mobile</label>
                <input type="text" id="lawyerMobile" placeholder="Mobile">
            </div>
            <div>
                <label for="lawyerEmail">Email</label>
                <input type="email" id="lawyerEmail" placeholder="Email">
            </div>
            <div class="full">
                <label for="lawyerAddress">Address</label>
                <input type="text" id="lawyerAddress" class="uppercase-input" placeholder="Address">
            </div>
            <div class="full">
                <label for="lawyerArea">Area</label>
                <select id="lawyerArea">
                    <option value="">Select Area</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="icon-btn save-icon-btn" title="Save Lawyer" aria-label="Save Lawyer">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6.8 3.5h8.9l2.8 2.8v13a1.7 1.7 0 0 1-1.7 1.7H7.2a1.7 1.7 0 0 1-1.7-1.7V5.2a1.7 1.7 0 0 1 1.3-1.7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 3.5v5.2h6.1V3.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 16h6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>
