<div class="main-content add-product-main">
    <div class="add-product-shell invoice-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Invoice</h2>
                <p class="add-product-subtitle">Create and save invoice records quickly.</p>
            </div>
        </div>

        <form id="invoiceForm">
            <div class="add-product-grid invoice-grid">
                <div class="field">
                    <label for="customer">Customer</label>
                    <select id="customer" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input class="readonly-input" type="text" id="address" readonly>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input class="readonly-input" type="email" id="email" readonly>
                </div>

                <div class="field">
                    <label for="tel">Tel</label>
                    <input class="readonly-input" type="text" id="tel" readonly>
                </div>

                <div id="vatNoWrap" class="field is-hidden">
                    <label for="vatNo">VAT No</label>
                    <input class="readonly-input" type="text" id="vatNo" readonly>
                </div>
                <div id="vatValueWrap" class="field is-hidden">
                    <label for="vatValue">VAT Value (%)</label>
                    <input type="number" id="vatValue" min="0" step="0.01" value="0" placeholder="Enter VAT %">
                </div>

                <div class="field">
                    <label for="invoiceDate">Invoice Date</label>
                    <input type="date" id="invoiceDate" required>
                </div>
            </div>
            <div class="add-product-actions">
                <button type="submit">Save</button>
                <button class="icon-btn back-icon-btn" id="backToInvoiceListBtn" type="button" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
            </div>
        </form>
    </div>
</div>
