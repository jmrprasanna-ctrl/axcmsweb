<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice - AXIS_CMS_WEB</title>
<script src="../../assets/extracted/pages/invoices/create-invoice.inline-script-1.js"></script>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/invoice-view.css">
<link rel="stylesheet" href="../../assets/css/add-product.css">
<link rel="stylesheet" href="../../assets/extracted/pages/invoices/create-invoice.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../clients/client-list.html">Client</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

                     
<div class="main-content add-product-main invoice-main">
    <div class="invoice-page-header">
        <h2 class="invoice-title">Create Invoice</h2>
        <button class="icon-btn back-icon-btn" id="backToInvoiceListBtn" type="button" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
    </div>
    <div class="add-product-shell invoice-shell">
        <form id="invoiceForm">
            <div class="add-product-grid invoice-grid">
                <div class="field">
                    <label for="customer">Customer</label>
                    <select id="customer" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input class="readonly-input" type="text" id="address" readonly>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input class="readonly-input" type="email" id="email" readonly>
                </div>

                <div class="field">
                    <label for="tel">Tel</label>
                    <input class="readonly-input" type="text" id="tel" readonly>
                </div>

                <div id="vatNoWrap" class="field is-hidden">
                    <label for="vatNo">VAT No</label>
                    <input class="readonly-input" type="text" id="vatNo" readonly>
                </div>
                <div id="vatValueWrap" class="field is-hidden">
                    <label for="vatValue">VAT Value (%)</label>
                    <input type="number" id="vatValue" min="0" step="0.01" value="0" placeholder="Enter VAT %">
                </div>

                <div class="field">
                    <label for="invoiceDate">Invoice Date</label>
                    <input type="date" id="invoiceDate" required>
                </div>

            </div>
            <div class="invoice-services-card">
                <div class="invoice-services-header">
                    <h3>Invoice Description & Amount</h3>
                    <button class="icon-btn add-line-icon-btn" id="addServiceRowBtn" type="button" title="Add line" aria-label="Add line">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
                <div class="table-scroll">
                    <table class="table product-table" id="serviceLinesTable">
                        <thead>
                            <tr>
                                <th style="width: 70px;">No</th>
                                <th>Description</th>
                                <th style="width: 200px;">Amount</th>
                                <th style="width: 110px;">Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="invoice-services-total">
                    <span>Total</span>
                    <strong id="invoiceServicesTotal">0.00</strong>
                </div>
            </div>
            <div class="add-product-actions">
                <button class="btn save-icon-btn" type="submit" title="Save" aria-label="Save"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 4.5h11l3 3V19a1.5 1.5 0 0 1-1.5 1.5h-12A1.5 1.5 0 0 1 4 19V6a1.5 1.5 0 0 1 1-1.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M8 4.5v5h7v-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M8 15.5h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></svg></button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../../assets/extracted/pages/invoices/create-invoice.inline-script-2.js"></script>

</body>
</html>
