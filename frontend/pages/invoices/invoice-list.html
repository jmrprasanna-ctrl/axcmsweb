<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice List - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/invoice-list.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../clients/client-list.html">Client</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="invoice-list-page-header">
        <h2>Invoice List</h2>
        <a class="icon-btn back-icon-btn" href="../dashboard.html" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="invoice-list-actions">
            <input type="text" id="invoiceSearch" class="search-inline" placeholder="Search Invoice No, Client, Description, Status">
            <a class="icon-btn add-icon-btn" href="create-invoice.html" id="addInvoiceBtn" title="Add Invoice" aria-label="Add Invoice">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                </svg>
            </a>
        </div>
        <div class="card invoice-list-card">
            <table id="invoiceTable">
                <thead>
                    <tr>
                        <th>Invoice No</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/invoice-list.js"></script>
</body>
</html>
