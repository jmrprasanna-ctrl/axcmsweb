<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/machine.html">Machines</a></li>

        <li><a href="../vendors/list-vendor.html">Vendors</a></li>

        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Monthly Profit Chart</h2></header>
    <div class="form-container">
        <canvas id="profitChart"></canvas>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
async function renderProfitChart(){
    try{
        const data = await request("/analytics/profit","GET");
        const ctx = document.getElementById("profitChart").getContext("2d");
        new Chart(ctx,{
            type:"line",
            data:{
                labels:data.map(d=>d.month),
                datasets:[{
                    label:"Net Profit",
                    data:data.map(d=>d.net_profit),
                    backgroundColor:"rgba(75, 192, 192, 0.5)",
                    borderColor:"rgba(75, 192, 192, 1)",
                    fill:true,
                    tension:0.3
                }]
            },
            options:{responsive:true}
        });
    }catch(err){
        alert("Failed to render profit chart");
    }
}
renderProfitChart();

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}
</script>
</body>
</html>
