<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .notification-grid{
        display: grid;
        grid-template-columns: 1.1fr 1.9fr;
        gap: 16px;
    }
    .notification-card{
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        padding: 16px;
    }
    .notification-list{
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .notification-item{
        display: grid;
        gap: 6px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8fbff;
        font-size: 12px;
        line-height: 1.35;
    }
    .notification-row{
        display: grid;
        grid-template-columns: minmax(120px, 1fr) 1.3fr auto;
        gap: 8px;
        align-items: center;
    }
    .notification-title{
        font-weight: 700;
        font-size: 12px;
        color: #1f3650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .notification-meta{
        font-size: 11px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .notification-body{
        display: none;
        font-size: 11px;
        color: #2d4056;
        border-top: 1px dashed #d5e1ee;
        padding-top: 6px;
    }
    .notification-body.show{
        display: block;
    }
    .notification-actions{
        display: flex;
        gap: 6px;
    }
    .notification-actions .btn{
        margin: 0;
        padding: 4px 8px;
        font-size: 11px;
        line-height: 1.2;
        min-height: 26px;
    }
    @media (max-width: 900px){
        .notification-grid{
            grid-template-columns: 1fr;
        }
        .notification-row{
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Notifications</h2></header>

    <div class="notification-grid">
        <div class="notification-card" id="createNotificationCard">
            <h3>Create Notification</h3>
            <form id="notificationForm">
                <label>Title</label>
                <input type="text" id="title" placeholder="Notification title" required>

                <label>Notification</label>
                <textarea id="body" placeholder="Write a notification" required></textarea>

                <button type="submit">Create Notification</button>
            </form>
        </div>
        <div class="notification-card">
            <h3>All Notifications</h3>
            <div id="notificationList" class="notification-list"></div>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
const notificationList = document.getElementById("notificationList");
const createCard = document.getElementById("createNotificationCard");
const userRole = localStorage.getItem("role") || "";
if(userRole.toLowerCase() === "user"){
    createCard.style.display = "none";
}
function isAdminOrManager(){
    const role = (localStorage.getItem("role") || "").toLowerCase();
    return role === "admin" || role === "manager";
}

async function loadNotifications(){
    try{
        const notifications = await request("/notifications","GET");
        notificationList.innerHTML = "";
        notifications.forEach(n=>{
            const div = document.createElement("div");
            div.className = "notification-item";
            const canDelete = isAdminOrManager();
            div.innerHTML = `
                <div class="notification-row">
                    <div class="notification-title">${n.title || "(No title)"}</div>
                    <div class="notification-meta">${new Date(n.createdAt).toLocaleString()}</div>
                    <div class="notification-actions">
                        <button class="btn" type="button" onclick="toggleNotificationBody(${n.id})">View</button>
                        ${canDelete ? `<button class="btn btn-danger" type="button" onclick="deleteNotification(${n.id})">Delete</button>` : ""}
                    </div>
                </div>
                <div id="noti-body-${n.id}" class="notification-body">${n.body || ""}</div>
            `;
            notificationList.appendChild(div);
        });
        const userId = localStorage.getItem("userId");
        if(userId){
            localStorage.setItem(`notificationsLastSeen:${userId}`, new Date().toISOString());
        }
    }catch(err){
        alert(err.message || "Failed to load notifications");
    }
}

document.getElementById("notificationForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const data = {
        title: document.getElementById("title").value.trim(),
        body: document.getElementById("body").value.trim()
    };
    try{
        await request("/notifications","POST",data);
        showMessageBox("Notification created");
        e.target.reset();
        loadNotifications();
    }catch(err){
        alert(err.message || "Failed to create notification");
    }
});

async function deleteNotification(id){
    if(!confirm("Delete this notification?")) return;
    try{
        if(!isAdminOrManager()){
            alert("Only admins and managers can delete notifications.");
            return;
        }
        await request(`/notifications/${id}`,"DELETE");
        showMessageBox("Notification deleted");
        loadNotifications();
    }catch(err){
        alert(err.message || "Failed to delete notification");
    }
}

function toggleNotificationBody(id){
    const bodyEl = document.getElementById(`noti-body-${id}`);
    if(!bodyEl) return;
    bodyEl.classList.toggle("show");
}

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}

loadNotifications();
</script>
</body>
</html>
