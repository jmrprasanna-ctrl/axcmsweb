<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Expense - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .form-actions{
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
    }
    .btn-secondary{
        background: #e9f3fc;
        color: #0b4f93;
        border: 1px solid #cfe1f5;
        text-decoration: none;
    }
    .btn-secondary:hover{
        filter: brightness(0.98);
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Add Expense</h2></header>

    <div class="form-container">
        <form id="expenseForm">
            <label>Title</label>
            <input type="text" id="title" placeholder="Expense Title" required>

            <label>Customer</label>
            <select id="customer">
                <option value="">Select Customer</option>
            </select>

            <label>Amount</label>
            <input type="number" id="amount" placeholder="Amount" min="0" required>

            <label>Date & Time</label>
            <input type="datetime-local" id="date" required>

            <label>Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Repair">Repair</option>
                <option value="Customer Visit">Customer Visit</option>
                <option value="Brekdown">Brekdown</option>
                <option value="Personal">Personal</option>
                <option value="Miscellaneous">Miscellaneous</option>
            </select>

            <div class="form-actions">
                <button type="submit">Save Expense</button>
                <a class="btn btn-secondary" href="expense-list.html">Back</a>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
const now = new Date();
const tzOffset = now.getTimezoneOffset() * 60000;
const localISOTime = new Date(now - tzOffset).toISOString().slice(0,16);
document.getElementById("date").value = localISOTime;
const customerSelect = document.getElementById("customer");

async function loadGeneralCustomers(){
    try{
        const customers = await request("/customers","GET");
        const generalCustomers = (Array.isArray(customers) ? customers : [])
            .filter(c => String(c.customer_mode || "").toLowerCase() === "general")
            .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));

        customerSelect.innerHTML = `<option value="">Select Customer</option>`;
        generalCustomers.forEach((customer) => {
            const option = document.createElement("option");
            option.value = customer.name || "";
            option.textContent = customer.name || "";
            customerSelect.appendChild(option);
        });
    }catch(err){
        customerSelect.innerHTML = `<option value="">Failed to load customers</option>`;
    }
}

document.getElementById("expenseForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const data = {
        title: document.getElementById("title").value.trim(),
        customer: customerSelect.value.trim(),
        amount: parseFloat(document.getElementById("amount").value),
        date: document.getElementById("date").value,
        category: document.getElementById("category").value.trim()
    };

    try{
        await request("/expenses","POST",data);
        showMessageBox("Expense added successfully!");
        document.getElementById("expenseForm").reset();
    }catch(err){
        alert(err.message || "Failed to add expense");
    }
});

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}

loadGeneralCustomers();
</script>
</body>
</html>
