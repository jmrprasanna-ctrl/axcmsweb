<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense List - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/expenses/expense-list.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../clients/client-list.html">Client</a></li>
        <li><a href="../invoices/create-invoice.html">Invoices</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="expense-list-page-header">
        <h2>Expenses List</h2>
        <a class="icon-btn back-icon-btn" href="../dashboard.html" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="form-actions">
            <div class="date-filter">
                <label for="filterDate">Date</label>
                <input type="date" id="filterDate">
            </div>
            <div class="date-filter">
                <label for="filterPeriod">Period</label>
                <select id="filterPeriod">
                    <option value="date">Date</option>
                    <option value="week">Week</option>
                    <option value="month" selected>Month</option>
                    <option value="year">Annual</option>
                </select>
            </div>
            <div class="action-row">
                <a class="icon-btn add-icon-btn" href="add-expense.html" id="addExpenseBtn" title="Add" aria-label="Add">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                    </svg>
                </a>
                <button class="icon-btn save-pdf-icon-btn" type="button" onclick="exportPDF()" title="Save PDF" aria-label="Save PDF">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6.8 3.5h8.9l2.8 2.8v13a1.7 1.7 0 0 1-1.7 1.7H7.2a1.7 1.7 0 0 1-1.7-1.7V5.2a1.7 1.7 0 0 1 1.3-1.7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 3.5v5.2h6.1V3.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
                        <path d="M8.7 16h6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                    </svg>
                </button>
            </div>
            <input type="text" id="expenseSearch" class="search-inline" placeholder="Search Title, Client, Category">
        </div>
        <div class="summary-row">
            <div class="summary-box">
                <div class="label">Filtered Total Expenses</div>
                <div class="value" id="filteredTotal">0.00</div>
            </div>
            <div class="summary-box">
                <div class="label">Filtered Entries</div>
                <div class="value" id="filteredCount">0</div>
            </div>
            <div class="summary-box">
                <div class="label">Filter Info</div>
                <div class="value" id="filterInfo">Month</div>
            </div>
        </div>
        <div class="card" style="margin-top:12px;">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Client</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../../assets/extracted/pages/expenses/expense-list.inline-script-1.js"></script>
</body>
</html>
