<div class="main-content">
    <header><h2>Edit Expense</h2></header>

    <div class="form-container">
        <form id="expenseForm">
            <label>Title</label>
            <input type="text" id="title" placeholder="Expense Title" required>

            <label>Client</label>
            <input type="text" id="client" placeholder="Client name">

            <label>Amount</label>
            <input type="number" id="amount" placeholder="Amount" min="0" required>

            <label>Date & Time</label>
            <input type="datetime-local" id="date" required>

            <label>Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Lawyer Payment">Lawyer Payment</option>
                <option value="Colombo Court Visit">Colombo Court Visit</option>
                <option value="Outsttion Court Visit">Outsttion Court Visit</option>
                <option value="Document Charges">Document Charges</option>
                <option value="Failing Charges">Failing Charges</option>
                <option value="Personal">Personal</option>
                <option value="Other">Other</option>
                <option value="Sallary Pay">Sallary Pay</option>
            </select>

            <div class="form-actions">
                <button type="submit">Update Expense</button>
                <a class="icon-btn back-icon-btn" href="expense-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
            </div>
        </form>
    </div>
