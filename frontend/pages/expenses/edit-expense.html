<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Expense - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/expenses/edit-expense.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../clients/client-list.html">Client</a></li>
        <li><a href="../invoices/create-invoice.html">Invoices</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="edit-expense-page-header">
        <h2>Edit Expense</h2>
        <a class="icon-btn back-icon-btn" href="expense-list.html" title="Back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
    </header>

    <div class="form-container">
        <form id="expenseForm">
            <label>Title</label>
            <input type="text" id="title" placeholder="Expense Title" required>

            <label>Client</label>
            <input type="text" id="client" placeholder="Client name">

            <label>Amount</label>
            <input type="number" id="amount" placeholder="Amount" min="0" required>

            <label>Date & Time</label>
            <input type="datetime-local" id="date" required>

            <label>Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Lawyer Payment">Lawyer Payment</option>
                <option value="Colombo Court Visit">Colombo Court Visit</option>
                <option value="Outsttion Court Visit">Outsttion Court Visit</option>
                <option value="Document Charges">Document Charges</option>
                <option value="Failing Charges">Failing Charges</option>
                <option value="Personal">Personal</option>
                <option value="Other">Other</option>
                <option value="Sallary Pay">Sallary Pay</option>
            </select>

            <div class="form-actions">
                <button class="icon-btn save-icon-btn" type="submit" title="Save Expense" aria-label="Save Expense"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.8 3.5h8.9l2.8 2.8v13a1.7 1.7 0 0 1-1.7 1.7H7.2a1.7 1.7 0 0 1-1.7-1.7V5.2a1.7 1.7 0 0 1 1.3-1.7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path><path d="M8.7 3.5v5.2h6.1V3.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path><path d="M8.7 16h6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path></svg></button>
                <button class="icon-btn delete-icon-btn" id="deleteExpenseBtn" type="button" title="Delete Expense" aria-label="Delete Expense"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><path d="M10 4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><path d="M7 7l1 12h8l1-12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M10 11v5M14 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg></button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/expenses/edit-expense.inline-script-1.js"></script>
</body>
</html>
