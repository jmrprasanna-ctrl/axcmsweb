<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULMO TECHNOLOGIES - Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,0.12) 0, transparent 35%),
        radial-gradient(circle at 90% 95%, rgba(255,255,255,0.08) 0, transparent 30%),
        linear-gradient(135deg, #547fa8 0%, #244b6f 100%);
    padding: 20px;
    padding-bottom: 64px;
}

.login-container{
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,0.98);
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:0 24px 44px rgba(0, 30, 58, 0.35);
    padding:34px 34px 30px;
    text-align:center;
    position:relative;
}

.login-container img{
    width:128px;
    height:128px;
    object-fit:contain;
    margin:8px auto 10px;
}

.login-container h2{
    font-size:16px;
    font-weight:700;
    color:#2b2b2b;
    margin-bottom:6px;
}

.login-meta{
    font-size:16px;
    color:#5d7082;
    margin-bottom:22px;
}

.field{
    margin-bottom:16px;
    text-align:left;
}

.field label{
    display:block;
    font-size:16px;
    color:#425568;
    margin-bottom:7px;
    font-weight:600;
}

.login-container input{
    width:100%;
    height:52px;
    border:1px solid #d0d0d0;
    border-radius:12px;
    background:#fdfdfd;
    padding:0 16px;
    font-size:16px;
    color:#222;
}

.login-container input:focus{
    outline:none;
    border-color:#4f7ea9;
    box-shadow:0 0 0 3px rgba(79,126,169,0.2);
}

.login-container button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    margin-top:8px;
    background:linear-gradient(180deg, #5d8bb6 0%, #4f7da8 100%);
    color:#fff;
    font-size:16px;
    font-weight:600;
    letter-spacing:.2px;
    cursor:pointer;
    transition:background .2s ease, transform .2s ease;
}

.login-container button:hover{
    background:#3f6f9e;
    transform:translateY(-1px);
}

.forgot-password{
    display:inline-block;
    margin-top:16px;
    color:#4f708b;
    text-decoration:none;
    font-size:16px;
}

.forgot-password:hover{
    text-decoration:underline;
}

.app-global-footer{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px 14px;
    border-top:1px solid rgba(255,255,255,0.28);
    background:rgba(255,255,255,0.72);
    color:#1d3855;
    font-size:15px;
    z-index:99;
    backdrop-filter:blur(5px);
}

@media (max-width:640px){
    .login-container{
        max-width:95vw;
        padding:24px 20px 22px;
        border-radius:18px;
    }

    .login-container h2{
        font-size:16px;
        margin-bottom:6px;
    }

    .login-container img{
        width:96px;
        height:96px;
    }

    .login-container input,
    .login-container button{
        height:48px;
        font-size:16px;
        border-radius:10px;
    }

    .forgot-password{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <img src="../assets/images/logo.png" alt="Company Logo">
    <h2>User Login</h2>
    <p class="login-meta">PULMO TECHNOLOGIES</p>
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required>
    </div>
    <button onclick="login()">Login</button>
    <a href="#" class="forgot-password" onclick="forgotPassword()">Forgot password?</a>
</div>

<script src="../assets/js/api.js"></script>
<script>
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){ alert("Please fill all fields"); return; }

    try{
        const res = await request("/auth/login","POST",{email,password});
        localStorage.setItem("token",res.token);
        localStorage.setItem("role",res.user.role);
        localStorage.setItem("userId", res.user.id);
        localStorage.setItem("userEmail", res.user.email || email);
        if (res.user.name) {
            localStorage.setItem("userName", res.user.name);
        }
        window.location.href = "dashboard.html";
    }catch(err){
        alert(err.message || "Login failed");
    }
}

async function forgotPassword(){
    const email = prompt("Enter your email to reset password");
    if(!email) return;
    try{
        await request("/auth/forgot-password","POST",{email});
        alert("Password reset email sent. Check your inbox.");
    }catch(err){
        alert(err.message || "Failed to send email");
    }
}
</script>

</body>
</html>
