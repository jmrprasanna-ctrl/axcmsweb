<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacts - AXIS_CMS_WEB</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/contacts.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>AXIS_CMS_WEB</span>
    </div>
    <ul class="nav-links" style="visibility:hidden;">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../contacts/contacts.html">Contacts</a></li>
        <li><a href="../calendar.html">Calender</a></li>
        <li><a href="../clients/client-list.html">Client</a></li>
        <li><a href="../cases/case-list.html">Cases</a></li>
        <li><a href="../cases/finished.html">Finished</a></li>
        <li><a href="../invoices/invoice-list.html">Payments</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../finance/finance.html">Finance</a></li>
        <li><a href="../users/user-list.html">Users</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="contacts-page-header">
        <h2>Contacts</h2>
        <a class="icon-btn back-icon-btn" href="../dashboard.html" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15.5 5.5L9 12l6.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </a>
    </header>

    <section class="card contacts-card">
        <div class="contacts-toolbar">
            <input type="text" id="contactsSearch" placeholder="Search name, mobile, email, client id">
            <select id="contactsType">
                <option value="all">All</option>
                <option value="lawyer">Lawyer</option>
                <option value="client">Client</option>
            </select>
        </div>
        <table id="contactsTable">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Client ID</th>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/contacts.js"></script>
</body>
</html>
