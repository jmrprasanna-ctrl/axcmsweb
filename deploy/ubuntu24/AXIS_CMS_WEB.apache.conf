<VirtualHost *:80>
    ServerName __DOMAIN__
    ServerAdmin webmaster@localhost

    DocumentRoot __APP_DIR__/frontend/pages

    <Directory __APP_DIR__/frontend/pages>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /assets/ __APP_DIR__/frontend/assets/
    <Directory __APP_DIR__/frontend/assets>
        Require all granted
    </Directory>

    Alias /css/ __APP_DIR__/frontend/css/
    <Directory __APP_DIR__/frontend/css>
        Require all granted
    </Directory>

    Alias /js/ __APP_DIR__/frontend/js/
    <Directory __APP_DIR__/frontend/js>
        Require all granted
    </Directory>

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/

    ErrorLog ${APACHE_LOG_DIR}/AXIS_CMS_WEB_error.log
    CustomLog ${APACHE_LOG_DIR}/AXIS_CMS_WEB_access.log combined
</VirtualHost>
